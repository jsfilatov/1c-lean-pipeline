# Adapter: Claude Code
#
# Describes how to copy and adapt files from content/ for Claude Code.

tool: claude-code
schemaVersion: 1

detection:
  - exists: ".claude/"
  - exists: "CLAUDE.md"

rules:
  copyTo: ".claude/rules/{name}.md"
  frontmatter:
    keep: [description, alwaysApply]
    drop: [globs, category]

agents:
  copyTo: ".claude/agents/{name}.md"
  frontmatter:
    keep: [name, description, tools, modelHint, isSubagent, allowParallel]
    rename:
      modelHint: model

skills:
  copyTo: ".claude/skills/{name}/"
  mode: verbatim

entry:
  target: "CLAUDE.md"
  template: "See @AGENTS.md for project instructions.\n"
