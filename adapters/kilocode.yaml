# Adapter: Kilo Code
#
# Describes how to copy and adapt files from content/ for Kilo Code.

tool: kilocode
schemaVersion: 1

detection:
  - exists: ".kilocode/"

rules:
  copyTo: ".kilocode/rules/{name}.md"
  frontmatter:
    keep: [description, alwaysApply]
    drop: [globs, category]

agents:
  copyTo: ".kilocode/subagents/{name}.md"
  frontmatter:
    keep: [name, description, tools, modelHint]
    rename:
      modelHint: model
    addIf:
      isSubagent: { mode: subagent }
      "!isSubagent": { mode: all }
    drop: [allowParallel]

skills:
  copyTo: ".kilocode/skills/{name}/"
  mode: verbatim
